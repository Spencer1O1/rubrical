services:
  postgres:
    image: postgres:16-alpine
    container_name: rubrical-postgres
    environment:
      POSTGRES_USER: rubrical
      POSTGRES_PASSWORD: rubrical
      POSTGRES_DB: rubrical
    ports:
      - "5432:5432"
    volumes:
      - rubrical_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rubrical -d rubrical"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rubrical_pgdata:
